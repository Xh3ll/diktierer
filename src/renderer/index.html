<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:">
  <title>Diktierer</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">

    <header class="header">
      <div class="header-logo">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" x2="12" y1="19" y2="22"/>
        </svg>
        <span>Diktierer</span>
      </div>
      <div class="header-status">
        <span id="status-dot" class="status-dot"></span>
        <span id="status">Initialisiere...</span>
      </div>
    </header>

    <div id="update-bar" class="update-bar hidden">
      <span id="update-msg"></span>
      <button id="update-btn" class="update-btn"></button>
    </div>

    <main class="content">

      <section class="section">
        <label class="section-label">Aufnahmemodus</label>
        <div class="mode-toggle">
          <button id="mode-input" class="mode-btn active">
            <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/>
              <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
              <line x1="12" x2="12" y1="19" y2="22"/>
            </svg>
            Mikrofon / Eingang
          </button>
          <button id="mode-output" class="mode-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
              <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
              <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
            </svg>
            Ausgang (Systemton)
          </button>
        </div>
      </section>

      <section class="section" id="device-section">
        <label class="section-label" for="device-select">Eingangsgerät</label>
        <div class="row">
          <select id="device-select"></select>
          <button id="refresh-btn" class="icon-btn" title="Geräte aktualisieren">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/>
              <path d="M21 3v5h-5"/>
              <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/>
              <path d="M8 16H3v5"/>
            </svg>
          </button>
        </div>
      </section>

      <section class="section hidden" id="output-section">
        <label class="section-label" for="output-select">Wiedergabegerät</label>
        <div class="row">
          <select id="output-select"></select>
          <button id="refresh-output-btn" class="icon-btn" title="Geräte aktualisieren">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/>
              <path d="M21 3v5h-5"/>
              <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/>
              <path d="M8 16H3v5"/>
            </svg>
          </button>
        </div>
        <div class="info-box">
          Nimmt den gesamten Systemton auf — was auch immer auf diesem Gerät gespielt wird.
        </div>
      </section>

      <section class="controls-section">
        <button id="record-btn" class="record-btn" disabled>
          <span class="record-dot"></span>
          <span id="record-label">Aufnahme starten</span>
        </button>
        <div class="level-track">
          <div id="level-bar" class="level-bar"></div>
        </div>
      </section>

      <section class="section transcript-section">
        <div class="section-header">
          <label class="section-label">Transkription</label>
          <div class="action-group">
            <button id="copy-btn" class="action-btn">Kopieren</button>
            <button id="clear-btn" class="action-btn">Leeren</button>
            <button id="save-btn" class="action-btn accent">Speichern</button>
          </div>
        </div>
        <textarea id="transcript" placeholder="Starte die Aufnahme — die Transkription erscheint hier..." readonly></textarea>
      </section>

    </main>
  </div>
  <script src="app.js"></script>
</body>
</html>
